<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=yes">
  <link rel="stylesheet" href="./normal.css">
  <meta name="robots" content="noindex, nofollow">
  <title>ものおきば</title>
  <style>
    /* 全体：横並びにして端で折り返す設定 */
    ul {
      list-style: none;
      padding: 0;
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
    }

    /* 各アイテム：文字と画像を縦に並べて中央揃え */
    li {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 150px;
      margin-bottom: 15px;
    }

    /* 画像のサイズ調整 */
    .thumbnail {
      display: block;
      margin-top: 8px;
      width: 100%;
      max-width: 140px;
      height: auto;
      border: 1px solid #ccc;
      background-color: #f9f9f9; /* 読み込み前の下地 */
    }

    /* リンクテキスト：高さのズレを防ぎ、中央に配置 */
    li a {
      text-align: center;
      font-size: 14px;
      text-decoration: none;
      word-break: break-all;
      min-height: 3em;
      display: flex;
      align-items: center;
      justify-content: center;
    }
  </style>
</head>
<body>
  <h3>スタンプ</h3>
  <ul>
    <li><a href="2.jpg">千葉</a><img src="resize/2.jpg" class="thumbnail"></li>
    <li><a href="1.jpg">船橋</a><img src="resize/1.jpg" class="thumbnail"></li>
    <li><a href="3.jpg">大宮</a><img src="resize/3.jpg" class="thumbnail"></li>
    <li><a href="4.jpg">浦和</a><img src="resize/4.jpg" class="thumbnail"></li>
    <li><a href="5.jpg">赤羽</a><img src="resize/5.jpg" class="thumbnail"></li>
    <li><a href="6.jpg">羽田空港第2ターミナル</a><img src="resize/6.jpg" class="thumbnail"></li>
    <li><a href="7.jpg">北千住</a><img src="resize/7.jpg" class="thumbnail"></li>
    <li><a href="8.jpg">柏</a><img src="resize/8.jpg" class="thumbnail"></li>
    <li><a href="9.jpg">高円寺</a><img src="resize/9.jpg" class="thumbnail"></li>
    <li><a href="10.jpg">国分寺</a><img src="resize/10.jpg" class="thumbnail"></li>
    <li><a href="11.jpg">川崎</a><img src="resize/11.jpg" class="thumbnail"></li>
    <li><a href="12.jpg">武蔵小杉</a><img src="resize/12.jpg" class="thumbnail"></li>
    <li><a href="13.jpg">桜木町</a><img src="resize/13.jpg" class="thumbnail"></li>
    <li><a href="14.jpg">小田原</a><img src="resize/14.jpg" class="thumbnail"></li>
    <li><a href="15.jpg">藤沢</a><img src="resize/15.jpg" class="thumbnail"></li>
    <li><a href="16.jpg">横浜</a><img src="resize/16.jpg" class="thumbnail"></li>

  </ul>
</body>
</html>
